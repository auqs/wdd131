<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Austyn Quispe">
    <meta name="description" content="A page where you can find a recipe.">
    <title>RecipeBook</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <header>
        <img src="image1.png" alt="Recipebook Header.">
        <span class="Recipebook-title">RecipeBook</span>
    </header>
    <main>
        <div class="searchrecipe">
            <input type="text" id="recipe-search" placeholder="Find a recipe">
            <div class="magni-container">
                <img src="image3.svg" alt="A magnifying glass next to the recipe search">
            </div>
        </div>
        <hr class="divider">
        <div class="recipebox">
            <div class="imagebox">
                <img src="image2.jpg" alt="A delicious picture of an apple crisp">
            </div>
            <div class="content">
                <button class="tag-btn">dessert</button>
                <h2>Apple Crisp</h2>
                <!-- Code from https://wddbyui.github.io/wdd131/prove/prove_wk9.html -->
                <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
                >
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star">⭐</span>
                <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>
                <p>
                    This apple crisp recipe is a simple 
                    yet delicious fall dessert that's great 
                    served warm with vanilla ice cream.
                </p> 
            </div>
        </div>
        <div class="creditsnsocialcontainer">
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
            <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="image5.svg" alt="instagram icon"></a>
            <a href="#"><img src="image4.svg" alt="youtube icon"></a>
            <a href="#"><img src="image6.svg" alt="pinterest icon"></a>
            </div>                       
        </div>
    </main>
</body>
</html>
